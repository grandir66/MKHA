version: "3.8"

services:
  mkha:
    build: .
    container_name: mkha-orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
    environment:
      - ROUTER_A_PASSWORD=${ROUTER_A_PASSWORD:-}
      - ROUTER_B_PASSWORD=${ROUTER_B_PASSWORD:-}
      - MKHA_ENCRYPTION_PASSWORD=${MKHA_ENCRYPTION_PASSWORD:-}
    networks:
      - mgmt

networks:
  mgmt:
    driver: bridge
